<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="index.css">

    <title>NB Soft validacija forme</title>
</head>
<body>
    <div id="container" class="container offset-sm-2 col-sm-8" style="height:50%; background-color: rgba(232, 253, 253, 0.883);">
        <div class="row">
            <form>
                <div class="form-group">
                    <input class="form-control" type="text" name="Name" id="Name" placeholder="Name...">
                    <input class="form-control" type="text" name="Surname" id="Surname" placeholder="Surname...">
                </div>
                <div class="form-group">
                    <label for="pol">Odaberite pol:</label>
                    <select id="pol" name="pol">
                        <option value="">-----</option>
                        <option value="muski">Muski</option>
                        <option value="zenski">Zenski</option>
                        <option value="drugo">Drugo</option>
                    </select>
                    <input type="text" name="year" id="year" placeholder="Year of birth">
                </div>
                <div class="form-group">
                    <label for="address">Unesite ulicu i grad:</label>
                    <textarea class="form-control" name="address" id="address" placeholder="address"></textarea>
                </div>
                <div class="form-group">
                    <input type="checkbox" id="terms">
                    <label for="terms">I agree to terms and conditions</label>
                    <input id="register" class="btn btn-primary form-control" type="submit" value="Register">
                </div>
                <div id="greska" class="form-group">
                    <span></span>
                </div>
            </form>
            <div id="confirmation" class="hide">
                <h1>Vasi podaci su uspesno poslati &#10004;</h1>
                <div id="podaci">
                    <h3 id="ime-prezime"></h3><br>
                    <h3 id="pol-godine"></h3><br>
                    <h3 id="adresa"></h3>
                </div>
            </div>
        </div>
    </div>


    <script src="./index.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
